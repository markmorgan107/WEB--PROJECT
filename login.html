<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Level Up Life</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="arrow.png">
</head>

<body>
  <div id="vanta-bg" style="position: fixed; z-index: -1; width: 100%; height: 100vh; top: 0; left: 0;"></div>
  <a href="web project.html" class="btn-home">Home</a>

  <div class="login-container">
    <div class="login-box">
      <h1>Welcome Back</h1>
      <p>Log in to continue your progress</p>

      <form onsubmit="return validateLogin()" action="">
        <span id="error" class="error-msg"></span>
        <input type="email" id="email" placeholder="Email">
        <span id="emailerror" class="error-msg"></span>
        <input type="password" id="password" placeholder="Password">
        <span id="passerror" class="error-msg"></span>
        <button type="submit" class="btn btn-primary">Log In</button>
      </form>

      <p class="login-footer">
        <a href="forgot-password.html">Forgot password?</a> <br>Don’t have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </div>
  <script src="webproject.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  <script>
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true, touchControls: true, gyroControls: false,
      minHeight: 200.00, minWidth: 200.00, scale: 1.00, scaleMobile: 1.00,
      color: 0xd4af37, backgroundColor: 0x0c0c0c
    })
  </script>
</body>

</html>
